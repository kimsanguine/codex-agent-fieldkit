<svg xmlns="http://www.w3.org/2000/svg" width="2190" height="720" viewBox="0 0 2190 720" role="img" aria-label="Codex Agent Fieldkit hero banner">
  <defs>
    <pattern id="paper-dot" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.15" fill="#111111" fill-opacity="0.055"/>
    </pattern>
    <pattern id="scanline" x="0" y="0" width="118" height="8" patternUnits="userSpaceOnUse">
      <rect width="30" height="4" fill="#111111"/>
      <rect x="40" y="4" width="22" height="4" fill="#2f6f5e"/>
      <rect x="70" width="14" height="4" fill="#315f9f"/>
      <rect x="92" y="4" width="10" height="4" fill="#d46a32"/>
    </pattern>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="18" dy="18" stdDeviation="0" flood-color="#111111" flood-opacity="0.10"/>
    </filter>
    <style>
      .mono { font-family: "JetBrains Mono", "SFMono-Regular", Menlo, Consolas, monospace; }
      .serif { font-family: "Source Serif 4", Georgia, serif; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      .ink { stroke: #111111; fill: none; stroke-linecap: square; stroke-linejoin: miter; }
      .soft { stroke: #111111; fill: none; stroke-opacity: 0.22; }
      .blue { stroke: #315f9f; fill: none; }
      .green { stroke: #2f6f5e; fill: none; }
      .orange { stroke: #d46a32; fill: none; }
      .violet { stroke: #7553a8; fill: none; }
    </style>
  </defs>

  <rect width="2190" height="720" fill="#fbfaf4"/>
  <rect width="2190" height="720" fill="url(#paper-dot)"/>
  <rect x="20" y="22" width="2150" height="676" fill="none" stroke="#111111" stroke-width="1.3" stroke-opacity="0.46"/>
  <line x1="106" y1="22" x2="106" y2="698" stroke="#111111" stroke-opacity="0.12"/>
  <line x1="20" y1="635" x2="2170" y2="635" stroke="#111111" stroke-opacity="0.12"/>

  <g class="mono" fill="#111111" font-size="16" letter-spacing="3">
    <text x="146" y="78" fill="#d46a32">FIG_CAF_00</text>
    <text x="286" y="78" fill="#111111" fill-opacity="0.68">/ PUBLIC-SAFE DELIVERY KIT</text>
    <line x1="146" y1="100" x2="872" y2="100" stroke="#111111" stroke-opacity="0.18"/>
    <text x="58" y="66" font-size="26" fill="#111111" fill-opacity="0.70">+</text>
    <text x="2120" y="66" font-size="26" fill="#111111" fill-opacity="0.70">+</text>
    <text x="58" y="674" font-size="26" fill="#111111" fill-opacity="0.70">+</text>
    <text x="2120" y="674" font-size="26" fill="#111111" fill-opacity="0.70">+</text>
  </g>

  <g transform="translate(146 176)">
    <text class="serif" x="0" y="100" font-size="104" font-weight="700" letter-spacing="-1" fill="#111111">Codex Agent</text>
    <text class="serif" x="0" y="205" font-size="104" font-weight="700" letter-spacing="-1" fill="#111111">Fieldkit</text>
    <rect x="0" y="238" width="84" height="7" fill="#d46a32"/>
    <line x1="105" y1="242" x2="724" y2="242" stroke="#111111" stroke-opacity="0.52"/>
    <text class="sans" x="0" y="316" font-size="37" font-weight="700" fill="#111111">From prompt docs to verified agent handoff</text>
    <text class="sans" x="0" y="370" font-size="24" fill="#111111" fill-opacity="0.72">Folder, memory, data, eval, safety scan, and handoff evidence in one runnable public-safe kit.</text>
  </g>

  <g class="mono" transform="translate(70 130) rotate(90)" font-size="13" letter-spacing="4" fill="#111111" fill-opacity="0.35">
    <text x="0" y="0">RUNNABLE CONTEXT INFRASTRUCTURE FOR NON-ENGINEER BUILDERS</text>
  </g>

  <g transform="translate(1015 88)">
    <text class="mono" x="40" y="34" font-size="16" letter-spacing="2.5" fill="#111111" fill-opacity="0.76">DELIVERY LOOP</text>
    <path class="soft" d="M0 150 H172"/>
    <path class="soft" d="M0 320 H172"/>
    <text class="mono" x="16" y="135" font-size="15" fill="#111111" fill-opacity="0.72">IDEA</text>
    <text class="mono" x="16" y="305" font-size="15" fill="#111111" fill-opacity="0.72">OPERATOR</text>
    <circle cx="172" cy="150" r="6" fill="#fbfaf4" stroke="#315f9f" stroke-width="2"/>
    <circle cx="172" cy="320" r="6" fill="#fbfaf4" stroke="#2f6f5e" stroke-width="2"/>

    <g filter="url(#soft-shadow)" transform="translate(270 38)">
      <g transform="translate(0 0)">
        <polygon points="54,18 596,18 532,92 0,92" fill="#fbfaf4" stroke="#111111" stroke-width="1.4"/>
        <rect x="118" y="26" width="44" height="54" fill="#315f9f" fill-opacity="0.25" stroke="#315f9f" stroke-width="1.2"/>
        <text class="mono" x="194" y="64" font-size="18" fill="#111111">FOLDER</text>
      </g>
      <g transform="translate(26 72)">
        <polygon points="54,18 596,18 532,92 0,92" fill="#fbfaf4" stroke="#111111" stroke-width="1.4"/>
        <rect x="118" y="26" width="44" height="54" fill="#2f6f5e" fill-opacity="0.23" stroke="#2f6f5e" stroke-width="1.2"/>
        <text class="mono" x="194" y="64" font-size="18" fill="#111111">MEMORY</text>
      </g>
      <g transform="translate(52 144)">
        <polygon points="54,18 596,18 532,92 0,92" fill="#fbfaf4" stroke="#111111" stroke-width="1.4"/>
        <rect x="118" y="26" width="44" height="54" fill="#d46a32" fill-opacity="0.22" stroke="#d46a32" stroke-width="1.2"/>
        <text class="mono" x="194" y="64" font-size="18" fill="#111111">DATA</text>
      </g>
      <g transform="translate(78 216)">
        <polygon points="54,18 596,18 532,92 0,92" fill="#fbfaf4" stroke="#111111" stroke-width="1.4"/>
        <rect x="118" y="26" width="44" height="54" fill="#7553a8" fill-opacity="0.20" stroke="#7553a8" stroke-width="1.2"/>
        <text class="mono" x="194" y="64" font-size="18" fill="#111111">EVAL</text>
      </g>
      <g transform="translate(104 288)">
        <polygon points="54,18 596,18 532,92 0,92" fill="#fbfaf4" stroke="#111111" stroke-width="1.4"/>
        <rect x="118" y="26" width="44" height="54" fill="#315f9f" fill-opacity="0.20" stroke="#315f9f" stroke-width="1.2"/>
        <text class="mono" x="194" y="64" font-size="18" fill="#111111">SAFETY</text>
      </g>
      <g transform="translate(130 360)">
        <polygon points="54,18 596,18 532,92 0,92" fill="#fbfaf4" stroke="#111111" stroke-width="1.4"/>
        <rect x="118" y="26" width="44" height="54" fill="#2f6f5e" fill-opacity="0.20" stroke="#2f6f5e" stroke-width="1.2"/>
        <text class="mono" x="194" y="64" font-size="18" fill="#111111">HANDOFF</text>
      </g>
    </g>

    <path class="blue" stroke-width="1.5" d="M178 150 C238 150 254 116 310 116"/>
    <path class="green" stroke-width="1.5" d="M178 320 C244 320 248 470 438 470"/>

    <g transform="translate(930 132)">
      <text class="mono" x="22" y="-20" font-size="15" letter-spacing="2.3" fill="#111111" fill-opacity="0.72">OUTPUTS</text>
      <g transform="translate(0 0)">
        <rect x="0" y="0" width="150" height="54" rx="8" fill="#fbfaf4" stroke="#315f9f" stroke-width="1.5"/>
        <text class="mono" x="75" y="35" font-size="16" text-anchor="middle" fill="#315f9f">DEMO</text>
      </g>
      <g transform="translate(0 84)">
        <rect x="0" y="0" width="150" height="54" rx="8" fill="#fbfaf4" stroke="#2f6f5e" stroke-width="1.5"/>
        <text class="mono" x="75" y="35" font-size="16" text-anchor="middle" fill="#2f6f5e">TESTS</text>
      </g>
      <g transform="translate(0 168)">
        <rect x="0" y="0" width="150" height="54" rx="8" fill="#fbfaf4" stroke="#d46a32" stroke-width="1.5"/>
        <text class="mono" x="75" y="35" font-size="16" text-anchor="middle" fill="#d46a32">REPORT</text>
      </g>
      <g transform="translate(0 252)">
        <rect x="0" y="0" width="150" height="54" rx="8" fill="#fbfaf4" stroke="#7553a8" stroke-width="1.5"/>
        <text class="mono" x="75" y="35" font-size="16" text-anchor="middle" fill="#7553a8">HANDOFF</text>
      </g>
    </g>

    <path class="orange" stroke-width="1.4" d="M826 206 H930"/>
    <path d="M930 206 l-12 -6 v12 z" fill="#d46a32"/>
    <path class="green" stroke-width="1.4" d="M852 292 H930"/>
    <path d="M930 292 l-12 -6 v12 z" fill="#2f6f5e"/>
    <path class="violet" stroke-width="1.4" d="M878 380 H930"/>
    <path d="M930 380 l-12 -6 v12 z" fill="#7553a8"/>
  </g>

  <g class="mono" font-size="13" letter-spacing="2.8" fill="#111111" fill-opacity="0.42">
    <text x="146" y="672">REF. SYNTHETIC FAQ STARTER / GOLDEN SET / SAFETY SCAN / VALIDATION REPORT</text>
  </g>
  <rect x="26" y="688" width="2140" height="8" fill="url(#scanline)"/>
</svg>
